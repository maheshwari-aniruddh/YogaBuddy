name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'one-breath-app/**'

permissions:
  contents: write

jobs:
  build-and-deploy:
    concurrency: ci-${{ github.ref }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Install and Build 🔧
        run: |
          cd one-breath-app
          npm install
          npm run build

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: one-breath-app/dist
          branch: gh-pages
