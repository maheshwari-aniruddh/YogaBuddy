<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Breathing Meditation Menu</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        linear-gradient(to bottom, rgba(8,17,43,0.75), rgba(8,17,43,0.85)),
        url("Screenshot 2025-11-15 at 5.40.05 PM.png") center / cover no-repeat fixed;
      color: #f5f5ff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .menu-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
      width: 100%;
      margin-top: -120px;
    }

    .menu-title {
      text-align: center;
      font-size: 56px;
      font-weight: 300;
      letter-spacing: 0.05em;
      color: #ffffff;
      margin-bottom: 20px;
      margin-top: -150px;
      animation: fade-in 1s ease-out forwards;
      opacity: 0;
    }
    
    @keyframes fade-in {
      0% {
        opacity: 0;
        transform: translateY(30px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .menu-container {
      display: flex;
      flex-direction: row;
      gap: 24px;
      width: 100%;
      max-width: 1400px;
      justify-content: center;
    }

    .menu-button {
      flex: 1;
      min-width: 250px;
      padding: 64px 50px;
      background: linear-gradient(135deg, hsl(280, 70%, 65%, 0.3), hsl(240, 80%, 75%, 0.3));
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow:
        0 8px 20px rgba(0, 0, 0, 0.6),
        0 0 15px hsl(280, 70%, 65%, 0.3),
        inset 0 1px 0 rgba(255, 255, 255, 0.2);
      color: #ffffff;
      font-size: 26px;
      font-weight: 300;
      letter-spacing: 0.05em;
      text-align: center;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      display: block;
      opacity: 0;
      animation: fade-in-up 0.8s ease-out forwards;
    }
    
    .menu-button:nth-child(1) {
      animation-delay: 0.1s;
    }
    
    .menu-button:nth-child(2) {
      animation-delay: 0.2s;
    }
    
    .menu-button:nth-child(3) {
      animation-delay: 0.3s;
    }
    
    @keyframes fade-in-up {
      0% {
        opacity: 0;
        transform: translateY(30px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .menu-button:hover {
      transform: translateY(-4px) scale(1.05);
      background: linear-gradient(135deg, hsl(280, 70%, 65%, 0.5), hsl(240, 80%, 75%, 0.5));
      box-shadow:
        0 12px 28px rgba(0, 0, 0, 0.7),
        0 0 22px hsl(280, 70%, 65%, 0.5),
        inset 0 1px 0 rgba(255, 255, 255, 0.3);
    }

    .menu-button:active {
      transform: translateY(-2px) scale(1.02);
    }

    .menu-button.morning {
      background: linear-gradient(135deg, hsl(280, 70%, 65%, 0.3), hsl(260, 75%, 70%, 0.3));
    }
    
    .menu-button.morning:hover {
      background: linear-gradient(135deg, hsl(280, 70%, 65%, 0.5), hsl(260, 75%, 70%, 0.5));
    }

    .menu-button.stress {
      background: linear-gradient(135deg, hsl(280, 70%, 65%, 0.3), hsl(240, 80%, 75%, 0.3));
    }
    
    .menu-button.stress:hover {
      background: linear-gradient(135deg, hsl(280, 70%, 65%, 0.5), hsl(240, 80%, 75%, 0.5));
    }

    .menu-button.night {
      background: linear-gradient(135deg, hsl(260, 75%, 70%, 0.3), hsl(240, 80%, 75%, 0.3));
    }
    
    .menu-button.night:hover {
      background: linear-gradient(135deg, hsl(260, 75%, 70%, 0.5), hsl(240, 80%, 75%, 0.5));
    }

    .home-button {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      padding: 16px 48px;
      background: linear-gradient(135deg, hsl(280, 70%, 65%, 0.3), hsl(240, 80%, 75%, 0.3));
      border-radius: 50px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow:
        0 8px 20px rgba(0, 0, 0, 0.6),
        0 0 15px hsl(280, 70%, 65%, 0.3),
        inset 0 1px 0 rgba(255, 255, 255, 0.2);
      color: #ffffff;
      font-size: 20px;
      font-weight: 300;
      letter-spacing: 0.05em;
      text-align: center;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      display: block;
    }

    .home-button:hover {
      transform: translateX(-50%) translateY(-2px);
      background: linear-gradient(135deg, hsl(280, 70%, 65%, 0.5), hsl(240, 80%, 75%, 0.5));
      box-shadow:
        0 12px 28px rgba(0, 0, 0, 0.7),
        0 0 22px hsl(280, 70%, 65%, 0.5),
        inset 0 1px 0 rgba(255, 255, 255, 0.3);
    }

    .home-button:active {
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>
  <div class="menu-wrapper">
    <h1 style="font-size: 80px;" class="menu-title">Meditation</h1>
    
    <div style="padding-top: 150px;" class="menu-container">
      <a href="hill.html" class="menu-button morning">Morning Meditation</a>
      
      <a href="index.html" class="menu-button stress">Stress Relief</a>
      
      <a href="index(night_animation).html" class="menu-button night">Night Meditation</a>
    </div>
  </div>
  
  <a href="/menu" class="home-button">Home</a>
</body>
</html>
