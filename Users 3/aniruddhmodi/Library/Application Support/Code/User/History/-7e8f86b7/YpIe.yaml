name: blue_journal_glassy
description: Blue Journal with Liquid Glass Aesthetic and Video Entries
publish_to: 'none' # for private local work
version: 1.0.0

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  intl: ^0.18.0
  table_calendar: ^3.0.9
  fl_chart: ^0.66.2
  vibration: ^1.8.3
  curved_navigation_bar: ^1.0.3
  image_picker: ^1.0.7
  video_player: ^2.8.4
  path_provider: ^2.1.3
  cupertino_icons: ^1.0.6
  firebase_core: ^2.25.4
  firebase_auth: ^4.17.4
  cloud_firestore: ^4.15.4
  firebase_storage: ^11.6.7
  firebase: ^10.1.0
  firebase_core_web: ^2.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/images/wallpaper.jpg
    - assets/emojis/supersad.png
    - assets/emojis/sad.png
    - assets/emojis/ok.png
    - assets/emojis/happy.png
    - assets/emojis/superhappy.png
# Add any other images or emojis you use

