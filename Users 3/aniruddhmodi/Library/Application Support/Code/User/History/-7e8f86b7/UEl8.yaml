name: roze
description: Roze - A beautiful daily journal with mood tracking and reflections
publish_to: 'none' # for private local work
version: 1.0.0

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  intl: ^0.18.0
  table_calendar: ^3.0.9
  fl_chart: ^0.66.2
  vibration: ^1.8.3
  curved_navigation_bar: ^1.0.3
  image_picker: ^1.0.7
  video_player: ^2.8.4
  path_provider: ^2.1.5
  cupertino_icons: ^1.0.6
  firebase_core: ^3.15.1
  firebase_auth: ^5.6.2
  firebase_crashlytics: ^4.3.9
  firebase_analytics: ^11.5.2
  firebase_storage: ^12.4.9
  share_plus: ^6.3.0

  firebase_core_web: ^2.10.0
  cloud_firestore: ^5.6.12
  google_sign_in: ^6.1.4
  url_launcher: ^6.2.5
  flutter_local_notifications: ^17.0.0
  shared_preferences: ^2.2.2
  timezone: ^0.9.2
  pdf: ^3.11.3
  printing: ^5.14.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true
  assets:
    - assets/images/wallpaper.jpg
    - assets/images/app_icon.png
    # Add any other assets you use

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"  # Create this file - should be 1024x1024 px
  # Optional: Different icons for different platforms
  # adaptive_icon_background: "#FFF9F5"  # Your app's cream color
  # adaptive_icon_foreground: "assets/images/app_icon_foreground.png"

